<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — Festa do Noah</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Nunito', sans-serif; background: linear-gradient(160deg, #0f1c2e 0%, #1a3050 100%); min-height: 100vh; padding: 20px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1.5px, transparent 1.5px); background-size: 24px 24px; pointer-events: none; }
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 340px; text-align: center; }
  .login-icon { font-size: 52px; margin-bottom: 12px; }
  .login-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: #5bb0f0; margin-bottom: 4px; }
  .login-sub { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 22px; }
  .login-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.1); border: 2px solid rgba(91,176,240,0.35); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 18px; color: white; text-align: center; letter-spacing: 4px; outline: none; margin-bottom: 12px; }
  .login-input:focus { border-color: #5bb0f0; }
  .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #1a7acc, #0f5fa0); color: white; border: none; border-radius: 12px; font-family: 'Fredoka One', cursive; font-size: 18px; cursor: pointer; }
  .login-error { font-size: 13px; color: #e06060; margin-top: 10px; display: none; }
  #dashboard { display: none; max-width: 700px; margin: 0 auto; position: relative; z-index: 1; padding-top: 10px; }
  .dash-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .dash-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: #5bb0f0; }
  .dash-title span { color: rgba(255,255,255,0.4); font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 600; display: block; margin-top: 2px; }
  .btn-refresh { background: rgba(26,122,204,0.25); border: 1px solid rgba(91,176,240,0.35); color: #5bb0f0; border-radius: 10px; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
  .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 18px; }
  @media(min-width:480px){ .stats-grid { grid-template-columns: repeat(4,1fr); } }
  .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 16px 10px; text-align: center; }
  .stat-icon { font-size: 26px; margin-bottom: 4px; }
  .stat-num { font-family: 'Fredoka One', cursive; font-size: 34px; line-height: 1; margin-bottom: 2px; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .c-total .stat-num { color: #5bb0f0; }
  .c-baby .stat-num { color: #6be06b; }
  .c-kid .stat-num { color: #f0d060; }
  .c-adult .stat-num { color: #a090f0; }
  .table-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; }
  .table-top { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .table-top-title { font-family: 'Fredoka One', cursive; font-size: 17px; color: rgba(255,255,255,0.75); }
  .filter-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
  .ftab { padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.12); background: none; color: rgba(255,255,255,0.4); transition: all 0.2s; }
  .ftab.active { background: rgba(26,122,204,0.35); border-color: #5bb0f0; color: #5bb0f0; }
  .guest-list { padding: 8px; }
  .guest-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; transition: background 0.15s; }
  .guest-row:hover { background: rgba(255,255,255,0.04); }
  .g-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .av-baby { background: rgba(107,224,107,0.15); }
  .av-kid { background: rgba(240,208,96,0.15); }
  .av-adult { background: rgba(160,144,240,0.15); }
  .g-info { flex: 1; min-width: 0; }
  .g-name { font-weight: 800; font-size: 14px; color: rgba(255,255,255,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .g-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
  .b-baby { background: rgba(107,224,107,0.12); color: #6be06b; border: 1px solid rgba(107,224,107,0.25); }
  .b-kid { background: rgba(240,208,96,0.12); color: #f0d060; border: 1px solid rgba(240,208,96,0.25); }
  .b-adult { background: rgba(160,144,240,0.12); color: #a090f0; border: 1px solid rgba(160,144,240,0.25); }
  .state-center { text-align: center; padding: 30px; color: rgba(255,255,255,0.35); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <p class="login-title">Painel Admin</p>
    <p class="login-sub">Festa do Poderoso Noah 🍼</p>
    <input type="password" class="login-input" id="senha" placeholder="Senha" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Entrar</button>
    <p class="login-error" id="login-err">Senha incorreta.</p>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <div class="dash-title">Painel Admin <span>🍼 Festa do Poderoso Noah</span></div>
    <button class="btn-refresh" onclick="loadGuests()">🔄 Atualizar</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card c-total"><div class="stat-icon">👥</div><div class="stat-num" id="ct">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card c-baby"><div class="stat-icon">👶</div><div class="stat-num" id="cb">0</div><div class="stat-label">Até 5 anos</div></div>
    <div class="stat-card c-kid"><div class="stat-icon">🧒</div><div class="stat-num" id="ck">0</div><div class="stat-label">6 a 10 anos</div></div>
    <div class="stat-card c-adult"><div class="stat-icon">🧑</div><div class="stat-num" id="ca">0</div><div class="stat-label">Adultos</div></div>
  </div>
  <div class="table-card">
    <div class="table-top">
      <span class="table-top-title">Lista de Convidados</span>
      <div class="filter-tabs">
        <button class="ftab active" onclick="setFilter('todos',this)">Todos</button>
        <button class="ftab" onclick="setFilter('Até 5 anos',this)">Até 5 anos</button>
        <button class="ftab" onclick="setFilter('6 a 10 anos',this)">6–10 anos</button>
        <button class="ftab" onclick="setFilter('Adulto (11+)',this)">Adultos</button>
      </div>
    </div>
    <div class="guest-list" id="guest-list">
      <div class="state-center">🎈 Nenhuma confirmação ainda.</div>
    </div>
  </div>
</div>

<script>
  const SENHA_ADMIN = 'noah2025';
  const STORAGE_KEY = 'festa_noah_guests';
  let allGuests = [];
  let currentFilter = 'todos';

  function login() {
    if (document.getElementById('senha').value === SENHA_ADMIN) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadGuests();
    } else {
      document.getElementById('login-err').style.display = 'block';
      document.getElementById('senha').classList.add('error');
    }
  }

  function loadGuests() {
    allGuests = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    updateStats();
    renderGuests();
  }

  function updateStats() {
    document.getElementById('ct').textContent = allGuests.length;
    document.getElementById('cb').textContent = allGuests.filter(g => g.faixa === 'Até 5 anos').length;
    document.getElementById('ck').textContent = allGuests.filter(g => g.faixa === '6 a 10 anos').length;
    document.getElementById('ca').textContent = allGuests.filter(g => g.faixa === 'Adulto (11+)').length;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderGuests();
  }

  function renderGuests() {
    const list = document.getElementById('guest-list');
    const filtered = currentFilter === 'todos' ? allGuests : allGuests.filter(g => g.faixa === currentFilter);
    if (!filtered.length) { list.innerHTML = '<div class="state-center">🎈 Nenhuma confirmação ainda.</div>'; return; }
    list.innerHTML = filtered.map(g => {
      const isBaby = g.faixa === 'Até 5 anos';
      const isKid = g.faixa === '6 a 10 anos';
      const avClass = isBaby ? 'av-baby' : isKid ? 'av-kid' : 'av-adult';
      const badgeClass = isBaby ? 'b-baby' : isKid ? 'b-kid' : 'b-adult';
      const emoji = isBaby ? '👶' : isKid ? '🧒' : '🧑';
      const sub = g.acompanhanteDe !== 'Convidado principal' ? `Acomp. de ${g.acompanhanteDe}` : 'Convidado principal';
      return `<div class="guest-row"><div class="g-avatar ${avClass}">${emoji}</div><div class="g-info"><div class="g-name">${g.nome}</div><div class="g-sub">${g.idade} anos · ${sub}</div></div><span class="badge ${badgeClass}">${g.faixa}</span></div>`;
    }).join('');
  }
</script>
</body>
</html>
