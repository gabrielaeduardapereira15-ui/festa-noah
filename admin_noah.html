<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — Festa do Noah</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Nunito', sans-serif; background: linear-gradient(160deg, #0f3460 0%, #1a5fa0 100%); min-height: 100vh; padding: 24px 16px; }
body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px); background-size: 22px 22px; pointer-events: none; }
.container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.header-left h1 { font-family: 'Fredoka One', cursive; font-size: 28px; color: white; }
.header-left p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.btn-refresh { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); border-radius: 12px; padding: 10px 16px; color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
.btn-refresh:hover { background: rgba(255,255,255,0.25); }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 18px; text-align: center; backdrop-filter: blur(10px); }
.stat-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.stat-number { font-family: 'Fredoka One', cursive; font-size: 42px; color: white; line-height: 1; }
.stat-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }
.guests-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.guests-header { padding: 18px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: gap; }
.guests-title { font-family: 'Fredoka One', cursive; font-size: 18px; color: #1a5fa0; }
.filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-tab { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #d0e4ff; background: white; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: #666; cursor: pointer; transition: all 0.2s; }
.filter-tab.active { background: #1a7acc; border-color: #1a7acc; color: white; }
.guest-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f5f8ff; }
.guest-item:last-child { border-bottom: none; }
.guest-left { display: flex; align-items: center; gap: 12px; }
.guest-avatar { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.avatar-baby { background: #e8fce8; }
.avatar-kid { background: #fffbe8; }
.avatar-adult { background: #f0ecff; }
.guest-name { font-weight: 800; font-size: 15px; color: #1a1a1a; }
.guest-sub { font-size: 12px; color: #888; margin-top: 1px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
.badge-baby { background: #e8fce8; color: #2a8c2a; }
.badge-kid { background: #fffbe8; color: #8c6c00; }
.badge-adult { background: #f0ecff; color: #5040a0; }
.empty-state { padding: 40px 20px; text-align: center; color: #aaa; }
.empty-state .empty-emoji { font-size: 48px; display: block; margin-bottom: 12px; }
.loading { padding: 40px 20px; text-align: center; color: #aaa; font-weight: 700; }
.error-state { padding: 20px; text-align: center; background: #fff8f8; color: #c03030; font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Painel Admin</h1>
      <p>🎈 Festa do Poderoso Noah</p>
    </div>
    <button class="btn-refresh" onclick="loadGuests()">🔄 Atualizar</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-emoji">👥</span>
      <div class="stat-number" id="stat-total">–</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <span class="stat-emoji">👶</span>
      <div class="stat-number" id="stat-baby">–</div>
      <div class="stat-label">Até 5 anos</div>
    </div>
    <div class="stat-card">
      <span class="stat-emoji">🧒</span>
      <div class="stat-number" id="stat-kid">–</div>
      <div class="stat-label">6 a 10 anos</div>
    </div>
    <div class="stat-card">
      <span class="stat-emoji">🧑</span>
      <div class="stat-number" id="stat-adult">–</div>
      <div class="stat-label">Adultos</div>
    </div>
  </div>

  <div class="guests-card">
    <div class="guests-header">
      <span class="guests-title">Lista de Convidados</span>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-tab" onclick="setFilter('Até 5 anos', this)">Até 5 anos</button>
        <button class="filter-tab" onclick="setFilter('6 a 10 anos', this)">6–10 anos</button>
        <button class="filter-tab" onclick="setFilter('Adulto (11+)', this)">Adultos</button>
      </div>
    </div>
    <div id="guests-list"><div class="loading">⏳ Carregando...</div></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpIRNFsFTswfVDc4iCREUMj69Yk9EJlDtv4OCENkicB1hTJkBMvS_HojYkdrAKrn4N/exec';

let allGuests = [];
let currentFilter = 'all';

function getAvatarClass(faixa) {
  if (faixa === 'Até 5 anos') return 'avatar-baby';
  if (faixa === '6 a 10 anos') return 'avatar-kid';
  return 'avatar-adult';
}

function getAvatarEmoji(faixa) {
  if (faixa === 'Até 5 anos') return '👶';
  if (faixa === '6 a 10 anos') return '🧒';
  return '🧑';
}

function getBadgeClass(faixa) {
  if (faixa === 'Até 5 anos') return 'badge-baby';
  if (faixa === '6 a 10 anos') return 'badge-kid';
  return 'badge-adult';
}

function updateStats(guests) {
  document.getElementById('stat-total').textContent = guests.length;
  document.getElementById('stat-baby').textContent = guests.filter(g => g.faixa === 'Até 5 anos').length;
  document.getElementById('stat-kid').textContent = guests.filter(g => g.faixa === '6 a 10 anos').length;
  document.getElementById('stat-adult').textContent = guests.filter(g => g.faixa === 'Adulto (11+)').length;
}

function renderGuests(guests) {
  const list = document.getElementById('guests-list');
  const filtered = currentFilter === 'all' ? guests : guests.filter(g => g.faixa === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-emoji">🎈</span><p>Nenhum convidado ainda.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(g => `
    <div class="guest-item">
      <div class="guest-left">
        <div class="guest-avatar ${getAvatarClass(g.faixa)}">${getAvatarEmoji(g.faixa)}</div>
        <div>
          <div class="guest-name">${g.nome}</div>
          <div class="guest-sub">${g.idade} anos · ${g.acompanhanteDe !== 'Convidado principal' ? 'Acomp. de ' + g.acompanhanteDe : 'Convidado principal'}</div>
        </div>
      </div>
      <span class="badge ${getBadgeClass(g.faixa)}">${g.faixa}</span>
    </div>
  `).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderGuests(allGuests);
}

async function loadGuests() {
  document.getElementById('guests-list').innerHTML = '<div class="loading">⏳ Carregando...</div>';
  document.getElementById('stat-total').textContent = '–';
  document.getElementById('stat-baby').textContent = '–';
  document.getElementById('stat-kid').textContent = '–';
  document.getElementById('stat-adult').textContent = '–';

  try {
    const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const data = await res.json();
    allGuests = Array.isArray(data) ? data : [];
    updateStats(allGuests);
    renderGuests(allGuests);
  } catch (err) {
    document.getElementById('guests-list').innerHTML = `<div class="error-state">❌ Erro ao carregar. Verifique a conexão e tente atualizar.</div>`;
  }
}

loadGuests();
</script>
</body>
</html>
